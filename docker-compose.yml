services:
  db:
    image: postgres:16-alpine
    container_name: taskify-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskify
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taskify"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: taskify-api
    env_file:
      - ./apps/api/.env
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: taskify-web
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "3003:3003"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
