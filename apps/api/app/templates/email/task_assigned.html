<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Task Assigned</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px;border-bottom:1px solid #f4f4f5;">
              <span style="font-size:14px;font-weight:600;letter-spacing:-0.02em;color:#000000;">Taskify</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 40px;">
              <h1 style="margin:0 0 8px;font-size:20px;font-weight:600;color:#000000;letter-spacing:-0.02em;">New task assigned</h1>
              <p style="margin:0 0 24px;font-size:14px;color:#52525b;line-height:1.6;">
                Hi {{user_name}}, a new task has been assigned to you in <strong>{{project_name}}</strong>.
              </p>
              <div style="background:#f8f8f8; padding: 16px; border-radius: 8px; border: 1px solid #eeeeee;">
                <p style="margin:0; font-size:15px; font-weight:600; color:#000000;">{{task_title}}</p>
              </div>
              <p style="margin:24px 0 0;font-size:12px;color:#a1a1aa;">
                Log in to Taskify to view details and update progress.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
