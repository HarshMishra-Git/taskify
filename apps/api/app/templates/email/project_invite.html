<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You've been invited</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px;border-bottom:1px solid #f4f4f5;">
              <span style="font-size:14px;font-weight:600;letter-spacing:-0.02em;color:#000000;">Taskify</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 40px;">
              <h1 style="margin:0 0 8px;font-size:20px;font-weight:600;color:#000000;letter-spacing:-0.02em;">You've been added to a project</h1>
              <p style="margin:0 0 24px;font-size:14px;color:#52525b;line-height:1.6;">
                <strong style="color:#000000;">{{inviter_name}}</strong> has added you to
                <strong style="color:#000000;">{{project_name}}</strong> as a <strong style="color:#000000;">{{role}}</strong>.
                Click below to open the project.
              </p>
              <a href="{{invite_url}}"
                 style="display:inline-block;padding:10px 24px;background:#000000;color:#ffffff;font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;">
                Go to Project
              </a>
              <p style="margin:24px 0 0;font-size:12px;color:#a1a1aa;">
                This link expires in 24 hours.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 40px;border-top:1px solid #f4f4f5;">
              <p style="margin:0;font-size:12px;color:#a1a1aa;">
                Or copy this link: <a href="{{invite_url}}" style="color:#000000;word-break:break-all;">{{invite_url}}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
